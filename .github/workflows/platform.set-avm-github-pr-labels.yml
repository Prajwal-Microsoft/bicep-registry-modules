# Workflow for adding labels to newly created PRs
name: .Platform - Set AVM GitHub PR labels

on:
  pull_request: # Temporarily using `pull_request` while `pull_request_target` usage is under discussion
    types: [opened, ready_for_review]

jobs:
  SetAvmGitHubPrLabels:
    name: Set-AvmGitHubPrLabels
    # Skip on forks: this job needs the TEAM_LINTER_APP_ID / TEAM_LINTER_PRIVATE_KEY GitHub-App secrets,
    # which only exist on the upstream Azure/bicep-registry-modules repo. Without them
    # actions/create-github-app-token fails. Guard mirrors the per-module workflows' fork pattern.
    if: github.repository == 'Azure/bicep-registry-modules'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: "Checkout"
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: actions/create-github-app-token@v3
        id: generate-token
        with:
          app-id: ${{ secrets.TEAM_LINTER_APP_ID }}
          private-key: ${{ secrets.TEAM_LINTER_PRIVATE_KEY }}
      - name: "Run scripts"
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ steps.generate-token.outputs.token }}
        run: |
          # Load used functions
          . (Join-Path $env:GITHUB_WORKSPACE 'utilities' 'pipelines' 'platform' 'Set-AvmGitHubPrLabels.ps1')

          $functionInput = @{
            RepoRoot = $env:GITHUB_WORKSPACE
            Repo     = "${{ github.repository_owner }}/${{ github.event.repository.name }}"
            PrUrl = "${{ github.event.pull_request.url }}"
          }

          Write-Verbose "Invoke task with" -Verbose
          Write-Verbose ($functionInput | ConvertTo-Json | Out-String) -Verbose

          Set-AvmGitHubPrLabels @functionInput -Verbose # -WhatIf
